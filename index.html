<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Scribble Eyes Awakening</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="stage" aria-label="Animated scribble eyes opening into purple and blue effects">
      <canvas id="scribble-canvas"></canvas>

      <section class="copy" aria-hidden="true">
        <p class="eyebrow">black / purple / blue</p>
        <h1>Awaken the scribble</h1>
        <p class="hint">hand-drawn eyes open, then the whole screen keeps crawling with ink</p>
      </section>
    </main>

    <noscript>
      <p class="no-script">Enable JavaScript to see the animated scribble eyes.</p>
    </noscript>

    <script src="script.js"></script>
  </body>
</html>
