<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Full profile scribble eyelid effect</title>
  <desc id="desc">A tall GitHub profile animation with black eyelids blinking open, glowing eyes, and cozy purple blue scribble effects moving around the screen.</desc>
  <defs>
    <radialGradient id="space" cx="50%" cy="42%" r="76%">
      <stop offset="0" stop-color="#26125f"/>
      <stop offset="0.34" stop-color="#12062b"/>
      <stop offset="1" stop-color="#020107"/>
    </radialGradient>

    <radialGradient id="softBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#04d9ff" stop-opacity="0.95"/>
      <stop offset="0.42" stop-color="#5f35ff" stop-opacity="0.62"/>
      <stop offset="1" stop-color="#020107" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="inkGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#04d9ff">
        <animate attributeName="stop-color" values="#04d9ff;#9f31ff;#4d20ff;#04d9ff" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="0.52" stop-color="#f4ecff">
        <animate attributeName="stop-color" values="#f4ecff;#04d9ff;#9f31ff;#f4ecff" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="1" stop-color="#9f31ff">
        <animate attributeName="stop-color" values="#9f31ff;#4d20ff;#04d9ff;#9f31ff" dur="6.6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0.75 0 0 0 0.15  0 0.65 0 0 0.05  0 0 1 0 0.95  0 0 0 0.95 0" result="color"/>
      <feMerge>
        <feMergeNode in="color"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="paperWobble" x="-12%" y="-12%" width="124%" height="124%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018 0.055" numOctaves="2" seed="17" result="noise">
        <animate attributeName="baseFrequency" values="0.016 0.04;0.028 0.075;0.02 0.055;0.016 0.04" dur="1.8s" repeatCount="indefinite"/>
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="8" xChannelSelector="R" yChannelSelector="G">
        <animate attributeName="scale" values="4;10;6;12;5" dur="1.4s" repeatCount="indefinite"/>
      </feDisplacementMap>
    </filter>

    <clipPath id="leftEyeClip">
      <path d="M202 430 C275 285 425 282 520 430 C420 552 295 552 202 430Z"/>
    </clipPath>
    <clipPath id="rightEyeClip">
      <path d="M680 430 C775 282 925 285 998 430 C905 552 780 552 680 430Z"/>
    </clipPath>

    <style>
      .scribble { fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 8 15 22 7; animation: crawl 2.25s linear infinite; }
      .slow { animation-duration: 5.8s; }
      .fast { animation-duration: 1.05s; }
      .floaty { transform-box: fill-box; transform-origin: center; animation: float 6s ease-in-out infinite; }
      .reverse { animation-direction: reverse; }
      .storm { transform-box: fill-box; transform-origin: center; animation: orbit 16s linear infinite, fadeIn 4.8s ease-out both; }
      .storm2 { transform-box: fill-box; transform-origin: center; animation: orbitBack 21s linear infinite, fadeIn 5.4s ease-out both; }
      .eye { transform-box: fill-box; transform-origin: center; animation: eyeWake 3.5s cubic-bezier(.16,1,.3,1) both, tinyBlink 7.5s ease-in-out 4.2s infinite; }
      .iris { transform-box: fill-box; transform-origin: center; animation: irisWake 3.6s cubic-bezier(.16,1,.3,1) both, breathe 3s ease-in-out 4s infinite; }
      .screenLidTop { animation: topLid 9s cubic-bezier(.16,1,.3,1) infinite; }
      .screenLidBottom { animation: bottomLid 9s cubic-bezier(.16,1,.3,1) infinite; }
      .cozy { animation: cozyFade 5s ease-out both, crawl 3.3s linear infinite; }
      .spark { animation: spark 4.6s ease-in-out infinite; }
      .spark:nth-of-type(2n) { animation-delay: .7s; }
      .spark:nth-of-type(3n) { animation-delay: 1.4s; }
      .scan { animation: scan 4.5s linear infinite; }

      @keyframes crawl { to { stroke-dashoffset: -120; } }
      @keyframes orbit { to { transform: rotate(360deg); } }
      @keyframes orbitBack { to { transform: rotate(-360deg); } }
      @keyframes float { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-12px) rotate(1.2deg); } }
      @keyframes fadeIn { 0%,46% { opacity: 0; } 100% { opacity: 1; } }
      @keyframes cozyFade { 0%,55% { opacity: 0; } 100% { opacity: .86; } }
      @keyframes eyeWake { 0%,28% { transform: scaleY(.02); opacity: .08; } 50% { transform: scaleY(1.18); opacity: 1; } 67% { transform: scaleY(.82); } 100% { transform: scaleY(1); opacity: 1; } }
      @keyframes tinyBlink { 0%,88%,100% { transform: scaleY(1); } 92% { transform: scaleY(.08); } 96% { transform: scaleY(1); } }
      @keyframes irisWake { 0%,40% { transform: scale(.05) rotate(-35deg); opacity: 0; } 65% { transform: scale(1.2) rotate(8deg); opacity: 1; } 100% { transform: scale(1) rotate(0); opacity: 1; } }
      @keyframes breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
      @keyframes topLid { 0%,24% { transform: translateY(0); } 38%,86% { transform: translateY(-405px); } 90% { transform: translateY(-45px); } 94%,100% { transform: translateY(-405px); } }
      @keyframes bottomLid { 0%,24% { transform: translateY(0); } 38%,86% { transform: translateY(405px); } 90% { transform: translateY(45px); } 94%,100% { transform: translateY(405px); } }
      @keyframes spark { 0%,100% { opacity: .14; transform: scale(.78); } 50% { opacity: .9; transform: scale(1.18); } }
      @keyframes scan { to { transform: translateY(72px); } }
    </style>
  </defs>

  <rect width="1200" height="900" fill="#020107"/>
  <rect width="1200" height="900" fill="url(#space)"/>
  <ellipse cx="600" cy="430" rx="610" ry="365" fill="#12072a" opacity=".34"/>
  <ellipse cx="600" cy="430" rx="450" ry="270" fill="url(#softBlue)" opacity=".28">
    <animate attributeName="opacity" values=".18;.34;.22;.31;.18" dur="6s" repeatCount="indefinite"/>
  </ellipse>

  <g opacity=".13">
    <rect class="scan" x="0" y="-72" width="1200" height="12" fill="#f4ecff"/>
    <rect class="scan" x="0" y="-38" width="1200" height="5" fill="#04d9ff"/>
  </g>

  <g filter="url(#glow)" opacity=".62">
    <path class="scribble storm" d="M92 430 C165 210 330 138 520 250 C685 348 780 700 1110 585" stroke="#4d20ff" stroke-width="3"/>
    <path class="scribble storm2" d="M76 620 C255 784 385 516 540 430 C735 324 845 166 1130 300" stroke="#04d9ff" stroke-width="2.5"/>
    <path class="scribble storm slow" d="M168 150 C300 335 462 142 610 320 C760 500 918 308 1030 725" stroke="#9f31ff" stroke-width="2.2"/>
    <path class="scribble storm2 slow" d="M120 770 C300 585 470 752 595 575 C735 376 962 545 1110 126" stroke="#f4ecff" stroke-width="1.6" opacity=".55"/>
  </g>

  <g class="cozy" filter="url(#paperWobble)">
    <path class="scribble" d="M54 102 C140 62 182 118 250 82 S388 40 450 110" stroke="#7f3cff" stroke-width="3" opacity=".45"/>
    <path class="scribble fast" d="M740 90 C830 36 898 130 976 78 S1092 52 1150 112" stroke="#04d9ff" stroke-width="2.6" opacity=".52"/>
    <path class="scribble slow" d="M44 815 C145 738 250 854 350 780 S502 735 590 820" stroke="#9f31ff" stroke-width="3" opacity=".5"/>
    <path class="scribble fast" d="M670 792 C770 735 825 842 928 770 S1082 742 1152 812" stroke="#04d9ff" stroke-width="2.7" opacity=".48"/>
    <path class="scribble" d="M35 455 C110 390 178 498 252 428 S382 380 455 458" stroke="#f4ecff" stroke-width="1.7" opacity=".34"/>
    <path class="scribble reverse" d="M750 455 C838 382 904 498 980 420 S1110 382 1168 458" stroke="#f4ecff" stroke-width="1.7" opacity=".34"/>
  </g>

  <g filter="url(#paperWobble)">
    <g class="eye floaty">
      <path d="M202 430 C275 285 425 282 520 430 C420 552 295 552 202 430Z" fill="#07020f" opacity=".86"/>
      <path class="scribble" d="M202 430 C275 285 425 282 520 430 C420 552 295 552 202 430Z" stroke="#f4ecff" stroke-width="8" filter="url(#glow)"/>
      <path class="scribble fast" d="M190 428 C284 296 405 260 532 426" stroke="#9f31ff" stroke-width="5"/>
      <path class="scribble slow" d="M210 438 C300 534 412 548 518 426" stroke="#04d9ff" stroke-width="4.2"/>
      <path class="scribble" d="M242 385 C282 320 350 294 420 322 C462 338 498 374 516 416" stroke="#6b22ff" stroke-width="3" opacity=".9"/>
      <g clip-path="url(#leftEyeClip)">
        <circle class="iris" cx="365" cy="430" r="85" fill="none" stroke="url(#inkGlow)" stroke-width="12" filter="url(#glow)"/>
        <circle class="iris" cx="365" cy="430" r="58" fill="none" stroke="#04d9ff" stroke-width="4" stroke-dasharray="5 10"/>
        <circle class="iris" cx="365" cy="430" r="32" fill="#020107" stroke="#f4ecff" stroke-width="2.5"/>
        <path class="scribble fast" d="M365 335 L380 526 M288 376 L440 490 M284 452 L448 400 M320 512 L416 350" stroke="#f4ecff" stroke-width="2" opacity=".62"/>
      </g>
      <path class="scribble fast" d="M245 360 L215 290 M300 318 L282 238 M362 303 L363 225 M425 322 L455 247 M475 365 L525 300" stroke="#9f31ff" stroke-width="4"/>
    </g>

    <g class="eye floaty reverse">
      <path d="M680 430 C775 282 925 285 998 430 C905 552 780 552 680 430Z" fill="#07020f" opacity=".86"/>
      <path class="scribble" d="M680 430 C775 282 925 285 998 430 C905 552 780 552 680 430Z" stroke="#f4ecff" stroke-width="8" filter="url(#glow)"/>
      <path class="scribble fast" d="M668 426 C795 260 916 296 1010 428" stroke="#04d9ff" stroke-width="5"/>
      <path class="scribble slow" d="M682 426 C788 548 900 534 990 438" stroke="#9f31ff" stroke-width="4.2"/>
      <path class="scribble" d="M684 416 C702 374 738 338 780 322 C850 294 918 320 958 385" stroke="#6b22ff" stroke-width="3" opacity=".9"/>
      <g clip-path="url(#rightEyeClip)">
        <circle class="iris" cx="835" cy="430" r="85" fill="none" stroke="url(#inkGlow)" stroke-width="12" filter="url(#glow)"/>
        <circle class="iris" cx="835" cy="430" r="58" fill="none" stroke="#9f31ff" stroke-width="4" stroke-dasharray="5 10"/>
        <circle class="iris" cx="835" cy="430" r="32" fill="#020107" stroke="#f4ecff" stroke-width="2.5"/>
        <path class="scribble fast" d="M835 335 L820 526 M760 490 L912 376 M752 400 L916 452 M784 350 L880 512" stroke="#f4ecff" stroke-width="2" opacity=".62"/>
      </g>
      <path class="scribble fast" d="M725 365 L675 300 M775 322 L745 247 M838 303 L837 225 M900 318 L918 238 M955 360 L985 290" stroke="#04d9ff" stroke-width="4"/>
    </g>
  </g>

  <g filter="url(#glow)" opacity=".86">
    <path class="scribble storm" d="M326 430 C450 360 545 365 600 430 S750 500 874 430" stroke="#f4ecff" stroke-width="1.8"/>
    <path class="scribble storm2" d="M290 505 C420 612 780 612 910 505" stroke="#9f31ff" stroke-width="1.8"/>
    <path class="scribble storm slow" d="M292 355 C420 232 780 232 908 355" stroke="#04d9ff" stroke-width="1.8"/>
  </g>

  <g filter="url(#glow)">
    <circle class="spark" cx="145" cy="205" r="4" fill="#04d9ff"/>
    <circle class="spark" cx="1048" cy="210" r="4" fill="#9f31ff"/>
    <circle class="spark" cx="92" cy="685" r="3" fill="#f4ecff"/>
    <circle class="spark" cx="1110" cy="690" r="3" fill="#04d9ff"/>
    <circle class="spark" cx="600" cy="132" r="3.5" fill="#9f31ff"/>
    <circle class="spark" cx="600" cy="760" r="3.5" fill="#04d9ff"/>
  </g>

  <g class="screenLidTop">
    <path d="M0 0 H1200 V445 C1020 366 820 332 600 332 C380 332 180 366 0 445Z" fill="#020107"/>
    <path class="scribble fast" d="M0 445 C180 366 380 332 600 332 C820 332 1020 366 1200 445" stroke="#1b0735" stroke-width="12" opacity=".8"/>
    <path class="scribble" d="M0 430 C250 330 415 300 600 304 C785 300 950 330 1200 430" stroke="#9f31ff" stroke-width="3" opacity=".75" filter="url(#glow)"/>
  </g>

  <g class="screenLidBottom">
    <path d="M0 900 H1200 V455 C1020 534 820 568 600 568 C380 568 180 534 0 455Z" fill="#020107"/>
    <path class="scribble fast" d="M0 455 C180 534 380 568 600 568 C820 568 1020 534 1200 455" stroke="#1b0735" stroke-width="12" opacity=".8"/>
    <path class="scribble" d="M0 470 C250 570 415 600 600 596 C785 600 950 570 1200 470" stroke="#04d9ff" stroke-width="3" opacity=".75" filter="url(#glow)"/>
  </g>

  <text x="600" y="805" text-anchor="middle" fill="url(#inkGlow)" font-family="Arial Black, Impact, sans-serif" font-size="46" letter-spacing="10" opacity=".86" filter="url(#glow)">OPEN YOUR EYES</text>
  <text x="600" y="840" text-anchor="middle" fill="#f4ecff" font-family="Arial, sans-serif" font-size="14" letter-spacing="7" opacity=".58">COZY SCRIBBLE STORM</text>
</svg>
